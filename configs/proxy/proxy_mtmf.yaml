# Proxy Task Pre-training: Multi-Task Multi-Feature (Base Model)
# Trains on feature recall proxy task with all 9 task vectors
experiment_name: proxy_mtmf
scenario: PROXY_MTMF

# Data
use_real_stimuli: true
n_values: [1, 2, 3]
task_features: ["location", "identity", "category"]
sequence_length: 6
batch_size: 32
num_train: 30000
num_val: 400
num_test: 200
num_workers: 4
match_probability: 0.5

# Model
model_type: "baseline"
hidden_size: 256
rnn_type: "gru"
num_layers: 1
dropout: 0.0
pretrained_backbone: true
freeze_backbone: true
num_locations: 4
num_categories: 4

# Optim
epochs: 45
lr: 0.0001
weight_decay: 0.0001
milestones: [20, 25]
gamma: 0.1
grad_clip: 1.0

# Validation
save_hidden: true
save_visualizations: true

# Data caching
cache_train_sequences: false
cache_val_sequences: true
num_visualizations: 2
